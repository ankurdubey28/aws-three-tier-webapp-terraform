services:
  postgres:
    image: postgres:18
    container_name: feedback-postgres
    environment:
      POSTGRES_DB: feedback
      POSTGRES_USER: feedback
      POSTGRES_PASSWORD: feedback
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedback -d feedback"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./app/backend
    container_name: feedback-backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://feedback:feedback@postgres:5432/feedback?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./app/frontend
    container_name: feedback-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
