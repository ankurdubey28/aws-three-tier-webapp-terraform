version: "3"

vars:
  COMPOSE: docker compose
  POSTGRES_CONTAINER: feedback-postgres
  POSTGRES_DB: feedback
  POSTGRES_USER: feedback
  BACKEND_URL: http://localhost:8080
  FRONTEND_URL: http://localhost:3000

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  db:up:
    desc: Start local PostgreSQL
    cmds:
      - "{{.COMPOSE}} up -d postgres"

  db:down:
    desc: Stop local PostgreSQL
    cmds:
      - "{{.COMPOSE}} down"

  db:reset:
    desc: Recreate local PostgreSQL and remove database volume
    cmds:
      - "{{.COMPOSE}} down -v"
      - "{{.COMPOSE}} up -d postgres"

  db:logs:
    desc: Follow PostgreSQL logs
    cmds:
      - "{{.COMPOSE}} logs -f postgres"

  db:shell:
    desc: Open psql shell in the PostgreSQL container
    cmds:
      - docker exec -it {{.POSTGRES_CONTAINER}} psql -U {{.POSTGRES_USER}} -d {{.POSTGRES_DB}}

  db:status:
    desc: Show PostgreSQL container status
    cmds:
      - "{{.COMPOSE}} ps postgres"

  app:up:
    desc: Build and start the full local application stack
    cmds:
      - "{{.COMPOSE}} up -d --build"

  app:down:
    desc: Stop the full local application stack
    cmds:
      - "{{.COMPOSE}} down"

  app:reset:
    desc: Recreate the full local application stack and remove database volume
    cmds:
      - "{{.COMPOSE}} down -v"
      - "{{.COMPOSE}} up -d --build"

  app:logs:
    desc: Follow logs for all local application services
    cmds:
      - "{{.COMPOSE}} logs -f"

  app:status:
    desc: Show local application container status
    cmds:
      - "{{.COMPOSE}} ps"

  app:test:
    desc: Run a local smoke test against frontend, backend, and database-backed API
    cmds:
      - curl -fsS {{.BACKEND_URL}}/health
      - curl -fsS {{.BACKEND_URL}}/api/feedback/
      - curl -fsS {{.FRONTEND_URL}}/

  backend:test:
    desc: Run Go backend tests
    dir: app/backend
    env:
      GOCACHE: /tmp/go-build-cache
      GOMODCACHE: /tmp/go-mod-cache
    cmds:
      - go test ./...
